<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Station Database — Izaland</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&f[]=cabinet-grotesk@400,500,700,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    :root{
      --font-body:'Satoshi','Inter',sans-serif;
      --font-display:'Cabinet Grotesk','Satoshi',sans-serif;
      --text-xs:clamp(0.75rem,0.7rem + 0.25vw,0.875rem);
      --text-sm:clamp(0.875rem,0.8rem + 0.35vw,1rem);
      --text-base:clamp(1rem,0.95rem + 0.25vw,1.125rem);
      --sp1:.25rem;--sp2:.5rem;--sp3:.75rem;--sp4:1rem;--sp6:1.5rem;--sp8:2rem;
      --r-sm:.375rem;--r-md:.5rem;--r-lg:.75rem;--r-xl:1rem;--r-full:9999px;
      --tx:180ms cubic-bezier(0.16,1,0.3,1);
    }
    [data-theme="dark"]{
      --bg:#0f1117;--sf:#161b27;--sf2:#1c2235;--sf3:#222840;
      --bd:#2a3147;--tx-c:#e2e8f0;--tx-m:#94a3b8;--tx-f:#4a5568;
      --ac:#3b82f6;--ac2:#1d4ed8;
    }
    [data-theme="light"]{
      --bg:#f8fafc;--sf:#ffffff;--sf2:#f1f5f9;--sf3:#e8eef5;
      --bd:#e2e8f0;--tx-c:#1e293b;--tx-m:#64748b;--tx-f:#cbd5e1;
      --ac:#2563eb;--ac2:#1e40af;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{-webkit-font-smoothing:antialiased;}
    body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-base);color:var(--tx-c);background:var(--bg);display:flex;flex-direction:column;}
    img{display:block;max-width:100%;height:auto;}
    nav{position:sticky;top:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:var(--sp4) var(--sp8);background:var(--bg);border-bottom:1px solid var(--bd);backdrop-filter:blur(12px);}
    .nav-logo{display:flex;align-items:center;gap:var(--sp3);text-decoration:none;color:var(--tx-c);}
    .nav-logo img{height:40px;width:auto;}
    .logo-dark{display:block!important;} .logo-light{display:none!important;}
    [data-theme="light"] .logo-dark{display:none!important;}
    [data-theme="light"] .logo-light{display:block!important;}
    .nav-links{display:flex;gap:var(--sp6);align-items:center;}
    .nav-links>a{font-size:var(--text-sm);color:var(--tx-m);text-decoration:none;font-weight:500;transition:color var(--tx);}
    .nav-links>a:hover{color:var(--tx-c);} .nav-links>a.active{color:var(--ac);}
    .theme-btn{background:none;border:1px solid var(--bd);color:var(--tx-m);border-radius:var(--r-md);padding:var(--sp2);cursor:pointer;display:flex;transition:color var(--tx),border-color var(--tx);}
    .theme-btn:hover{color:var(--tx-c);border-color:var(--tx-m);}
    .nav-dd{position:relative;}
    .nav-dd>button{background:none;border:none;font-size:var(--text-sm);color:var(--tx-m);font-weight:500;cursor:pointer;display:flex;align-items:center;gap:4px;padding:0;transition:color var(--tx);}
    .nav-dd>button:hover{color:var(--tx-c);} .nav-dd.active>button{color:var(--ac);}
    .nav-dd>button svg{transition:transform var(--tx);}
    .nav-dd.open>button svg{transform:rotate(180deg);}
    .dd{position:absolute;top:calc(100% + 10px);left:50%;transform:translateX(-50%) translateY(-4px);min-width:160px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r-lg);padding:var(--sp2);box-shadow:0 8px 24px oklch(0 0 0/.18);opacity:0;pointer-events:none;transition:opacity var(--tx),transform var(--tx);}
    .nav-dd.open .dd{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0);}
    .dd a{display:block;padding:var(--sp2) var(--sp3);font-size:var(--text-sm);color:var(--tx-m);text-decoration:none;border-radius:var(--r-md);font-weight:500;transition:background var(--tx),color var(--tx);white-space:nowrap;}
    .dd a:hover{background:var(--sf2);color:var(--tx-c);} .dd a.active{color:var(--ac);}
    .dd-lbl{display:block;font-size:var(--text-xs);font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--tx-f);padding:var(--sp2) var(--sp3) var(--sp1);}
    .nav-item--sub{position:relative;}
    .nav-item--sub>button{display:flex;align-items:center;justify-content:space-between;width:100%;background:none;border:none;padding:var(--sp2) var(--sp3);font-size:var(--text-sm);color:var(--tx-m);font-weight:500;cursor:pointer;border-radius:var(--r-md);transition:background var(--tx),color var(--tx);gap:var(--sp2);}
    .nav-item--sub>button:hover{background:var(--sf2);color:var(--tx-c);}
    .nav-item--sub.open>button{color:var(--tx-c);}
    .nav-item--sub>button svg{transition:transform var(--tx);flex-shrink:0;}
    .nav-item--sub.open>button svg{transform:rotate(180deg);}
    .dropdown--sub{position:absolute;top:0;left:calc(100% + 6px);min-width:160px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r-lg);padding:var(--sp2);box-shadow:0 8px 24px oklch(0 0 0/.18);opacity:0;pointer-events:none;transition:opacity var(--tx),transform var(--tx);transform:translateX(-4px);}
    .nav-item--sub.open .dropdown--sub{opacity:1;pointer-events:auto;transform:translateX(0);}
    .app{flex:1;display:flex;min-height:0;}
    .sb{width:320px;flex-shrink:0;background:var(--sf);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden;z-index:500;}
    .sb-head{padding:var(--sp4);border-bottom:1px solid var(--bd);}
    .sb-title{font-family:var(--font-display);font-size:var(--text-base);font-weight:800;margin-bottom:var(--sp1);}
    .sb-meta{font-size:var(--text-xs);color:var(--tx-m);display:flex;gap:var(--sp2);flex-wrap:wrap;align-items:center;margin-bottom:var(--sp3);}
    .sb-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:var(--r-full);font-size:10px;font-weight:700;letter-spacing:.04em;border:1px solid;}
    .search-wrap{position:relative;}
    .search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--tx-f);pointer-events:none;}
    #search{width:100%;padding:8px 10px 8px 34px;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--r-md);color:var(--tx-c);font-family:var(--font-body);font-size:var(--text-xs);outline:none;transition:border-color var(--tx);}
    #search:focus{border-color:var(--ac);} #search::placeholder{color:var(--tx-f);}

    /* ── FILTER GROUPS ── */
    .sb-filters{overflow-y:auto;border-bottom:1px solid var(--bd);max-height:220px;}
    .filter-group{padding:var(--sp2) var(--sp4) var(--sp3);}
    .filter-group+.filter-group{border-top:1px solid var(--bd);}
    .filter-group-label{
      font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
      color:var(--tx-f);margin-bottom:var(--sp2);display:flex;align-items:center;gap:6px;
    }
    .filter-group-label::after{content:'';flex:1;height:1px;background:var(--bd);}
    .filter-chips{display:flex;flex-wrap:wrap;gap:var(--sp1);}
    .filter-btn{padding:3px 10px;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;border:1px solid var(--bd);border-radius:var(--r-full);background:none;color:var(--tx-f);cursor:pointer;transition:all var(--tx);white-space:nowrap;}
    .filter-btn.on{background:var(--ac);color:white;border-color:var(--ac);}
    /* ─────────────────── */

    .sb-count{padding:var(--sp2) var(--sp4);font-size:var(--text-xs);color:var(--tx-f);border-bottom:1px solid var(--bd);}
    .sb-list{overflow-y:auto;flex:1;}
    .st-item{display:flex;align-items:center;gap:var(--sp3);padding:10px var(--sp4);cursor:pointer;border-bottom:1px solid var(--bd);transition:background var(--tx);}
    .st-item:hover{background:var(--sf2);} .st-item.active{background:var(--sf3);}
    .st-num{font-size:var(--text-xs);font-weight:700;color:var(--tx-f);width:28px;flex-shrink:0;text-align:right;}
    .st-dot-sb{width:10px;height:10px;border-radius:50%;flex-shrink:0;border:2px solid;}
    .st-info{flex:1;min-width:0;}
    .st-name{font-size:var(--text-xs);font-weight:600;color:var(--tx-c);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .st-lines{font-size:10px;color:var(--tx-m);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .st-type{font-size:10px;color:var(--tx-f);flex-shrink:0;}
    .detail{position:absolute;bottom:var(--sp4);left:calc(var(--sp4));z-index:600;width:280px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r-xl);padding:var(--sp4);box-shadow:0 8px 32px oklch(0 0 0/.28);transform:translateY(8px);opacity:0;pointer-events:none;transition:opacity var(--tx),transform var(--tx);}
    .detail.show{opacity:1;transform:translateY(0);pointer-events:auto;}
    .detail-close{position:absolute;top:var(--sp3);right:var(--sp3);background:none;border:none;color:var(--tx-f);cursor:pointer;padding:2px;border-radius:var(--r-sm);transition:color var(--tx);}
    .detail-close:hover{color:var(--tx-c);}
    .detail-name{font-family:var(--font-display);font-size:var(--text-sm);font-weight:800;margin-bottom:2px;padding-right:var(--sp6);line-height:1.2;}
    .detail-id{font-size:10px;color:var(--tx-f);margin-bottom:var(--sp3);font-family:monospace;}
    .detail-section{margin-bottom:var(--sp3);}
    .detail-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--tx-f);margin-bottom:var(--sp1);}
    .detail-lines{display:flex;flex-direction:column;gap:4px;}
    .detail-line{display:flex;align-items:center;gap:6px;font-size:var(--text-xs);color:var(--tx-m);}
    .detail-line-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
    .detail-coords{font-size:10px;color:var(--tx-m);font-family:monospace;}
    .detail-ogf{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--ac);text-decoration:none;margin-top:var(--sp2);transition:color var(--tx);}
    .detail-ogf:hover{color:var(--ac2);}
    .detail-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:var(--sp2);}
    .dtag{font-size:10px;padding:2px 6px;border-radius:var(--r-sm);background:var(--sf2);color:var(--tx-m);border:1px solid var(--bd);}
    #map{flex:1;min-height:0;}
    #ld{position:fixed;inset:0;z-index:9000;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);gap:var(--sp3);transition:opacity .5s;}
    #ld.done{opacity:0;pointer-events:none;}
    .spin{width:36px;height:36px;border:3px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .ld-txt{font-size:var(--text-sm);color:var(--tx-m);} .ld-sub{font-size:var(--text-xs);color:var(--tx-f);}
    #sbar{position:absolute;bottom:var(--sp4);right:var(--sp4);z-index:600;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r-full);padding:var(--sp2) var(--sp4);font-size:var(--text-xs);color:var(--tx-m);pointer-events:none;transition:opacity .4s;white-space:nowrap;box-shadow:0 4px 16px oklch(0 0 0/.25);}
    #sbar.h{opacity:0;}
    .lt{background:var(--sf)!important;border:1px solid var(--bd)!important;color:var(--tx-c)!important;font-family:var(--font-body)!important;font-size:11px!important;border-radius:var(--r-sm)!important;padding:3px 8px!important;}
    @media(max-width:768px){
      nav{padding:var(--sp3) var(--sp4);} .nav-links{gap:var(--sp3);}
      .app{flex-direction:column;}
      .sb{width:100%;max-height:240px;border-right:none;border-bottom:1px solid var(--bd);}
      .detail{left:var(--sp3);bottom:var(--sp4);width:calc(100vw - 2 * var(--sp3));}
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo">

      <button class="theme-btn" data-theme-toggle aria-label="Toggle theme">

      </button>
    </div>
  </nav>

  <div class="app">
    <div class="sb">
      <div class="sb-head">
        <div class="sb-title">Station Database</div>
        <div class="sb-meta">
          <span id="line-badge" class="sb-badge" style="color:#fff;border-color:#555;background:#333;">Loading&hellip;</span>
        </div>
        <div class="search-wrap">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <input id="search" type="search" placeholder="Search stations&hellip;" autocomplete="off">
        </div>
      </div>
      <div class="sb-filters" id="filters"></div>
      <div class="sb-count" id="count"></div>
      <div class="sb-list" id="list"></div>

    <div style="flex:1;position:relative;min-width:0;">
      <div id="map" style="position:absolute;inset:0;"></div>
      <div id="ld">
        <div class="spin"></div>
        <div class="ld-txt" id="ld-txt">Loading&hellip;</div>
        <div class="ld-sub" id="ld-sub"></div>
      </div>
      <div id="sbar" class="h"></div>
      <div class="detail" id="detail">
        <button class="detail-close" id="detail-close" aria-label="Close">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
        <div class="detail-name" id="d-name"></div>
        <div class="detail-id" id="d-id"></div>
        <div class="detail-section">
          <div class="detail-label">Lines</div>
          <div class="detail-lines" id="d-lines"></div>
        </div>
        <div class="detail-section">
          <div class="detail-label">Coordinates</div>
          <div class="detail-coords" id="d-coords"></div>
        </div>
        <div id="d-tags-wrap" class="detail-section" style="display:none">
          <div class="detail-label">Tags</div>
          <div class="detail-tags" id="d-tags"></div>
        </div>
        <a id="d-ogf" class="detail-ogf" href="#" target="_blank" rel="noopener">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          View on OGF
        </a>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
  // ─ theme toggle
  (function(){
    const t=document.querySelector('[data-theme-toggle]'),h=document.documentElement;
    let d=h.getAttribute('data-theme')||'dark'; if(!t)return;
    t.addEventListener('click',()=>{
      d=d==='dark'?'light':'dark'; h.setAttribute('data-theme',d);
      t.innerHTML=d==='dark'
        ?'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'
        :'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
    });
  })();

  // ─ nav dropdowns
  document.querySelectorAll('.nav-dd').forEach(dd=>{
    const b=dd.querySelector(':scope>button'); if(!b)return;
    b.addEventListener('click',e=>{ e.stopPropagation(); const o=dd.classList.contains('open'); document.querySelectorAll('.nav-dd.open,.nav-item--sub.open').forEach(x=>x.classList.remove('open')); if(!o)dd.classList.add('open'); });
  });
  document.querySelectorAll('.nav-item--sub').forEach(s=>{
    const b=s.querySelector(':scope>button'); if(!b)return;
    b.addEventListener('click',e=>{ e.stopPropagation(); const o=s.classList.contains('open'); document.querySelectorAll('.nav-item--sub.open').forEach(x=>x.classList.remove('open')); if(!o)s.classList.add('open'); });
  });
  document.addEventListener('click',()=>document.querySelectorAll('.nav-dd.open,.nav-item--sub.open').forEach(x=>x.classList.remove('open')));

  // ─ map
  const map=L.map('map',{center:[36.02,128.97],zoom:12,maxZoom:19});
  L.tileLayer('https://tile.opengeofiction.net/ogf-carto/{z}/{x}/{y}.png',{maxZoom:19,attribution:'&copy; <a href="https://opengeofiction.net" target="_blank">OpenGeoFiction</a>'}).addTo(map);

  const sbar=document.getElementById('sbar');
  function status(msg,ms=3000){ sbar.textContent=msg; sbar.classList.remove('h'); clearTimeout(sbar._t); sbar._t=setTimeout(()=>sbar.classList.add('h'),ms); }

  const stations={};
  let lineRegistry={};
  let lineGeom={};

  // ─ layers
  const polylineLayer=L.layerGroup().addTo(map);
  const markerLayer=L.layerGroup().addTo(map);
  let selectedId=null;

  function renderPolylines(){
    polylineLayer.clearLayers();
    Object.entries(lineGeom).forEach(([relId, segments])=>{
      const meta=lineRegistry[relId];
      if(!meta||meta.type==='disabled') return;
      const colour=meta.colour||'#888';
      const name=meta.name||relId;
      segments.forEach(seg=>{
        if(seg.length<2) return;
        const pl=L.polyline(seg,{color:colour,weight:4,opacity:.85,smoothFactor:1.2});
        pl.bindTooltip(name,{sticky:true,className:'lt'});
        pl.addTo(polylineLayer);
      });
    });
  }

  function primaryColour(st){
    if(!st.lines||!st.lines.length) return '#888';
    const meta=lineRegistry[st.lines[0].relId];
    return meta?meta.colour:'#888';
  }
  function makeIcon(col,selected=false){
    const sz=selected?14:10, bw=selected?3:2, sh=selected?'box-shadow:0 0 0 3px rgba(255,255,255,.22);':'';
    return L.divIcon({className:'',html:`<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:var(--sf,#161b27);border:${bw}px solid ${col};box-sizing:border-box;${sh}"></div>`,iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]});
  }

  function renderMarkers(){
    markerLayer.clearLayers();
    Object.values(stations).forEach(st=>{
      const col=primaryColour(st);
      const mk=L.marker([st.lat,st.lon],{icon:makeIcon(col),title:st.name,zIndexOffset:100});
      if(st.name) mk.bindTooltip(st.name,{sticky:true,className:'lt'});
      mk.on('click',()=>selectStation(String(st.id)));
      mk.addTo(markerLayer);
      st.marker=mk;
    });
  }

  // ─ sidebar
  let filterLine=null, searchQ='';

  // Group definitions: order matters, label shown, types that belong here
  const TYPE_GROUPS = [
    { key: 'all',        label: null,           types: null },
    { key: 'train',      label: '🚆 Train',      types: ['train','railway'] },
    { key: 'subway',     label: '🚇 Metro',      types: ['subway'] },
    { key: 'light_rail', label: '🚊 Light Rail', types: ['light_rail','tram'] },
    { key: 'monorail',   label: '🚝 Monorail',   types: ['monorail'] },
    { key: 'other',      label: '🔹 Other',      types: [] }, // catch-all
  ];
  const KNOWN_TYPES = new Set(['train','railway','subway','light_rail','tram','monorail','disabled']);

  function typeGroup(t){
    if(!t||t==='disabled') return null;
    for(const g of TYPE_GROUPS){
      if(!g.types) continue;
      if(g.types.includes(t)) return g.key;
    }
    return 'other';
  }

  function buildFilters(){
    const el=document.getElementById('filters'); el.innerHTML='';

    const usedLineIds=new Set();
    Object.values(stations).forEach(st=>st.lines.forEach(l=>usedLineIds.add(l.relId)));

    // Bucket lines by group
    const buckets = {};
    TYPE_GROUPS.forEach(g=>buckets[g.key]=[]);

    Object.entries(lineRegistry).forEach(([id,m])=>{
      if(!usedLineIds.has(id)) return;
      if(m.type==='disabled') return;
      const gk = typeGroup(m.type) || 'other';
      buckets[gk].push({id,m});
    });

    // "All" group (no label)
    const allGroup = document.createElement('div');
    allGroup.className = 'filter-group';
    const chips0 = document.createElement('div');
    chips0.className = 'filter-chips';
    const allBtn = document.createElement('button');
    allBtn.className = 'filter-btn' + (filterLine ? '' : ' on');
    allBtn.textContent = 'All';
    allBtn.onclick = () => { filterLine=null; buildFilters(); buildList(); };
    chips0.appendChild(allBtn);
    allGroup.appendChild(chips0);
    el.appendChild(allGroup);

    // One group per type category
    TYPE_GROUPS.forEach(g=>{
      if(!g.label) return; // skip 'all'
      const lines = buckets[g.key];
      if(!lines.length) return;

      const group = document.createElement('div');
      group.className = 'filter-group';

      const lbl = document.createElement('div');
      lbl.className = 'filter-group-label';
      lbl.textContent = g.label;
      group.appendChild(lbl);

      const chips = document.createElement('div');
      chips.className = 'filter-chips';

      lines.forEach(({id,m})=>{
        const b = document.createElement('button');
        b.className = 'filter-btn' + (filterLine===id ? ' on' : '');
        b.textContent = m.short || id;
        b.title = m.name || id;
        if(filterLine !== id){
          b.style.color = m.colour;
          b.style.borderColor = m.colour + '66';
        }
        b.onclick = () => { filterLine=id; buildFilters(); buildList(); };
        chips.appendChild(b);
      });

      group.appendChild(chips);
      el.appendChild(group);
    });
  }

  function buildList(){
    const list=document.getElementById('list'),cnt=document.getElementById('count');
    list.innerHTML='';
    let vis=Object.values(stations).filter(st=>{
      if(filterLine&&!st.lines.some(l=>l.relId===filterLine))return false;
      if(searchQ&&!st.name.toLowerCase().includes(searchQ))return false;
      return true;
    });
    if(filterLine){
      vis.sort((a,b)=>{
        const sa=a.lines.find(l=>l.relId===filterLine)?.seq??9999;
        const sb2=b.lines.find(l=>l.relId===filterLine)?.seq??9999;
        return sa-sb2;
      });
    } else {
      vis.sort((a,b)=>a.name.localeCompare(b.name));
    }
    cnt.textContent=vis.length+' station'+(vis.length!==1?'s':'')+' shown';
    vis.forEach((st,i)=>{
      const col=primaryColour(st);
      const item=document.createElement('div');
      item.className='st-item'+(String(st.id)===selectedId?' active':'');
      item.dataset.id=st.id;
      const lineNames=st.lines.map(l=>{ const m=lineRegistry[l.relId]; return m?m.short:l.relId; });
      item.innerHTML=`<span class="st-num">${i+1}</span><span class="st-dot-sb" style="background:var(--sf,#161b27);border-color:${col}"></span><span class="st-info"><span class="st-name">${st.name||'(unnamed)'}</span><span class="st-lines">${lineNames.join(', ')}</span></span><span class="st-type">${st.type||''}</span>`;
      item.addEventListener('click',()=>selectStation(String(st.id)));
      list.appendChild(item);
    });
  }

  // ─ detail
  function selectStation(sid){
    selectedId=sid;
    const st=stations[sid]; if(!st)return;
    Object.values(stations).forEach(s=>{ if(s.marker)s.marker.setIcon(makeIcon(primaryColour(s),String(s.id)===sid)); });
    document.querySelectorAll('.st-item').forEach(el=>el.classList.toggle('active',el.dataset.id===sid));
    map.flyTo([st.lat,st.lon],Math.max(map.getZoom(),14),{duration:.8});
    document.getElementById('d-name').textContent=st.name||'(unnamed)';
    document.getElementById('d-id').textContent='OGF node #'+st.id;
    document.getElementById('d-coords').textContent=st.lat.toFixed(6)+', '+st.lon.toFixed(6);
    document.getElementById('d-ogf').href='https://opengeofiction.net/node/'+st.id;
    const linesEl=document.getElementById('d-lines'); linesEl.innerHTML='';
    if(st.lines&&st.lines.length){
      st.lines.forEach(l=>{
        const meta=lineRegistry[l.relId];
        const col=meta?meta.colour:'#888';
        const name=meta?meta.name:('Line '+l.relId);
        const d=document.createElement('div'); d.className='detail-line';
        d.innerHTML=`<span class="detail-line-dot" style="background:${col}"></span><span>${name}</span>`;
        linesEl.appendChild(d);
      });
    } else {
      linesEl.innerHTML='<span style="color:var(--tx-f);font-size:10px">No line data</span>';
    }
    const tagEntries=Object.entries(st.tags||{}).filter(([k])=>k!=='name');
    const tagsEl=document.getElementById('d-tags'),tw=document.getElementById('d-tags-wrap');
    if(tagEntries.length){ tagsEl.innerHTML=tagEntries.map(([k,v])=>`<span class="dtag">${k}=${v}</span>`).join(''); tw.style.display=''; }
    else tw.style.display='none';
    document.getElementById('detail').classList.add('show');
  }
  document.getElementById('detail-close').addEventListener('click',()=>{
    document.getElementById('detail').classList.remove('show');
    selectedId=null;
    Object.values(stations).forEach(s=>{ if(s.marker)s.marker.setIcon(makeIcon(primaryColour(s),false)); });
    document.querySelectorAll('.st-item').forEach(el=>el.classList.remove('active'));
  });

  document.getElementById('search').addEventListener('input',e=>{ searchQ=e.target.value.toLowerCase().trim(); buildList(); });

  function updateBadge(){
    const el=document.getElementById('line-badge');
    const nSt=Object.keys(stations).length;
    const nLn=Object.keys(lineRegistry).length;
    el.style.background='#334155'; el.style.borderColor='#475569'; el.style.color='#e2e8f0';
    el.textContent=nSt+' stations \u00b7 '+nLn+' line'+(nLn!==1?'s':'');
  }

  async function main(){
    const ld=document.getElementById('ld'),ldTxt=document.getElementById('ld-txt'),ldSub=document.getElementById('ld-sub');
    ldTxt.textContent='Loading data\u2026';
    ldSub.textContent='Fetching stations and line geometry';
    try{
      const [stResp, lnResp] = await Promise.all([
        fetch('data/stations.json'),
        fetch('data/lines.json')
      ]);
      if(!stResp.ok) throw new Error('stations.json: HTTP '+stResp.status);
      if(!lnResp.ok) throw new Error('lines.json: HTTP '+lnResp.status);

      const [stData, lnData] = await Promise.all([stResp.json(), lnResp.json()]);

      lineRegistry = stData.lines || {};
      lineGeom = lnData.lines || {};

      const raw = stData.stations || [];
      raw.forEach(st=>{
        stations[String(st.id)] = {
          id: st.id,
          name: st.name || '',
          lat: st.lat,
          lon: st.lon,
          type: st.type || 'station',
          tags: st.tags || {},
          lines: (st.lines || []).map(l=>({ relId: String(l.relId), seq: l.seq })),
          marker: null
        };
      });

      ldSub.textContent='Rendering\u2026';
      renderPolylines();
      renderMarkers();
      updateBadge();
      buildFilters();
      buildList();

      const pts=Object.values(stations).map(s=>[s.lat,s.lon]);
      if(pts.length) map.fitBounds(L.latLngBounds(pts),{padding:[40,40]});

      status('Loaded '+raw.length+' stations');
    } catch(e){
      console.error(e);
      ldTxt.textContent='Failed to load data';
      ldSub.textContent=String(e);
      return;
    }
    ld.classList.add('done');
    setTimeout(()=>ld.remove(),600);
  }
  main();
  </script>
</body>
</html>
