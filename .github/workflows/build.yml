name: Build transit JSON

on:
  push:
    paths:
      - 'data/stations.xml'
      - 'data/lines.xml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run build script
        run: python scripts/build_json.py

      - name: Commit updated JSON files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stations.json data/lines.json
          git diff --cached --quiet || git commit -m "chore: rebuild stations.json + lines.json [skip ci]"
          git push
