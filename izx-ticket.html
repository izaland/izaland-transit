<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IZX Fare Calculator — Izaland Transit</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&f[]=cabinet-grotesk@400,500,700,800&display=swap" rel="stylesheet">
  <style>
    :root{
      --font-body:'Satoshi','Inter',sans-serif;
      --font-display:'Cabinet Grotesk','Satoshi',sans-serif;
      --text-xs:clamp(0.75rem,0.7rem + 0.25vw,0.875rem);
      --text-sm:clamp(0.875rem,0.8rem + 0.35vw,1rem);
      --text-base:clamp(1rem,0.95rem + 0.25vw,1.125rem);
      --text-lg:clamp(1.125rem,1rem + 0.75vw,1.5rem);
      --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
      --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;
      --space-6:1.5rem;--space-8:2rem;--space-12:3rem;
      --radius-sm:.375rem;--radius-md:.5rem;--radius-lg:.75rem;--radius-xl:1rem;
      --transition:180ms cubic-bezier(0.16,1,0.3,1);
    }
    [data-theme="dark"]{--bg:#0f1117;--surface:#161b27;--surface-2:#1c2235;--border:#2a3147;--text:#e2e8f0;--text-muted:#94a3b8;--text-faint:#4a5568;--accent:#3b82f6;--accent-hover:#2563eb;--accent-glow:rgba(59,130,246,0.15);}
    [data-theme="light"]{--bg:#f8fafc;--surface:#ffffff;--surface-2:#f1f5f9;--border:#e2e8f0;--text:#1e293b;--text-muted:#64748b;--text-faint:#94a3b8;--accent:#2563eb;--accent-hover:#1d4ed8;--accent-glow:rgba(37,99,235,0.1);}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{-webkit-font-smoothing:antialiased;}
    body{min-height:100dvh;font-family:var(--font-body);color:var(--text);background:var(--bg);line-height:1.6;}
    nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:var(--space-4) var(--space-8);background:var(--bg);border-bottom:1px solid var(--border);backdrop-filter:blur(12px);}
    .nav-logo{display:flex;align-items:center;gap:var(--space-3);text-decoration:none;color:var(--text);}
    .nav-links{display:flex;gap:var(--space-6);align-items:center;}
    .nav-links>a{font-size:var(--text-sm);color:var(--text-muted);text-decoration:none;font-weight:500;transition:color var(--transition);}
    .nav-links a:hover{color:var(--text);}
    .nav-links a.active{color:var(--accent);}
    .theme-btn{background:none;border:1px solid var(--border);color:var(--text-muted);border-radius:var(--radius-md);padding:var(--space-2);cursor:pointer;display:flex;transition:color var(--transition),border-color var(--transition);}
    .theme-btn:hover{color:var(--text);border-color:var(--text-muted);}
    .nav-item{position:relative;}
    .nav-item>button{background:none;border:none;font-size:var(--text-sm);color:var(--text-muted);font-weight:500;cursor:pointer;display:flex;align-items:center;gap:4px;padding:0;transition:color var(--transition);}
    .nav-item>button:hover{color:var(--text);}
    .nav-item.active>button{color:var(--accent);}
    .nav-item>button svg{transition:transform var(--transition);}
    .nav-item.open>button svg{transform:rotate(180deg);}
    .dropdown{position:absolute;top:calc(100% + 10px);left:50%;transform:translateX(-50%) translateY(-4px);min-width:190px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:var(--space-2);box-shadow:0 8px 24px oklch(0 0 0 / 0.18);opacity:0;pointer-events:none;transition:opacity var(--transition),transform var(--transition);}
    .nav-item.open .dropdown{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0);}
    .dropdown a{display:block;padding:var(--space-2) var(--space-3);font-size:var(--text-sm);color:var(--text-muted);text-decoration:none;border-radius:var(--radius-md);font-weight:500;transition:background var(--transition),color var(--transition);white-space:nowrap;}
    .dropdown a:hover{background:var(--surface-2);color:var(--text);}
    .dropdown a.active{color:var(--accent);}
    .dropdown-label{display:block;font-size:var(--text-xs);font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-faint);padding:var(--space-2) var(--space-3) var(--space-1);}
    .dropdown-divider{height:1px;background:var(--border);margin:var(--space-1) var(--space-2);}
    [data-theme="dark"]  .logo-light{display:none;}
    [data-theme="light"] .logo-dark{display:none;}
    .page-header{padding:var(--space-8) var(--space-8) 0;max-width:920px;margin:0 auto;}
    .back-link{font-size:var(--text-sm);color:var(--text-muted);text-decoration:none;display:inline-flex;align-items:center;gap:var(--space-2);margin-bottom:var(--space-6);transition:color var(--transition);}
    .back-link:hover{color:var(--text);}
    .page-label{font-size:var(--text-xs);font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);margin-bottom:var(--space-2);}
    .page-title{font-family:var(--font-display);font-size:var(--text-xl);font-weight:800;letter-spacing:-.02em;margin-bottom:var(--space-3);}
    .page-desc{font-size:var(--text-sm);color:var(--text-muted);max-width:60ch;margin-bottom:var(--space-8);}
    .sim-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:var(--space-8);max-width:920px;margin:0 auto var(--space-8);}
    .sim-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:end;gap:var(--space-4);margin-bottom:var(--space-6);}
    .sim-swap{background:var(--surface-2);border:1px solid var(--border);color:var(--text-muted);border-radius:var(--radius-md);padding:var(--space-2) var(--space-3);cursor:pointer;font-size:var(--text-sm);transition:color var(--transition),background var(--transition);height:42px;display:flex;align-items:center;}
    .sim-swap:hover{color:var(--text);background:var(--border);}
    .field-group{display:flex;flex-direction:column;gap:var(--space-2);}
    .field-label{font-size:var(--text-xs);font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-muted);}
    .field-select{background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:var(--radius-md);padding:var(--space-2) var(--space-3);font-size:var(--text-sm);font-family:var(--font-body);width:100%;height:42px;transition:border-color var(--transition);}
    .field-select:focus{outline:none;border-color:var(--accent);}
    .field-select option{background:var(--surface-2);}
    .field-input{background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:var(--radius-md);padding:var(--space-2) var(--space-3);font-size:var(--text-sm);font-family:var(--font-body);width:100%;height:42px;transition:border-color var(--transition);}
    .field-input:focus{outline:none;border-color:var(--accent);}
    .sim-options{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-4);margin-bottom:var(--space-6);}
    .sim-btn{background:var(--accent);color:#fff;border:none;border-radius:var(--radius-md);padding:var(--space-3) var(--space-6);font-size:var(--text-sm);font-weight:700;cursor:pointer;transition:background var(--transition);width:100%;}
    .sim-btn:hover{background:var(--accent-hover);}
    .sim-btn.secondary{background:var(--surface-2);color:var(--text-muted);border:1px solid var(--border);}
    .sim-btn.secondary:hover{background:var(--border);color:var(--text);}
    #results{display:none;margin-top:var(--space-8);border-top:1px solid var(--border);padding-top:var(--space-6);}
    .result-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:var(--space-4);flex-wrap:wrap;gap:var(--space-2);}
    .result-route{font-family:var(--font-display);font-size:var(--text-lg);font-weight:800;}
    .result-meta{font-size:var(--text-xs);color:var(--text-muted);}
    .service-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:var(--space-4);}
    .service-card{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:var(--space-4);}
    .service-card-header{display:flex;align-items:center;gap:var(--space-2);margin-bottom:var(--space-3);}
    .svc-badge{font-size:.7rem;font-weight:800;padding:2px 8px;border-radius:4px;letter-spacing:.04em;white-space:nowrap;}
    .svc-name{font-size:var(--text-xs);color:var(--text-muted);}
    .price-rows{display:flex;flex-direction:column;}
    .price-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:var(--text-xs);}
    .price-row:last-child{border-bottom:none;}
    .price-class{color:var(--text-muted);}
    .price-val{font-weight:700;font-variant-numeric:tabular-nums;}
    .price-usd{font-size:.68rem;color:var(--text-faint);margin-left:3px;}
    .card-km{font-size:.65rem;color:var(--text-faint);margin-top:var(--space-2);}
    .no-service{color:var(--text-faint);font-size:var(--text-xs);font-style:italic;padding:var(--space-4) 0;text-align:center;}
    .sz-note{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.25);border-radius:var(--radius-md);padding:var(--space-3) var(--space-4);font-size:var(--text-xs);color:#93c5fd;margin-bottom:var(--space-4);display:none;}
    .best-price .price-val{color:#34d399;}
    /* ── Keishin service badges ── */
    .svc-A{background:#002A91;color:#fff;}
    .svc-B{background:#1B71CB;color:#fff;}
    .svc-C{background:#4a8fcc;color:#fff;}
    .svc-Cp{background:#0e7ca6;color:#fff;}
    .svc-D{background:#926ACA;color:#fff;}
    .svc-E{background:#7c3aed;color:#fff;}
    .svc-F{background:#6b7280;color:#fff;}
    /* ── Ryānkai service badges ── */
    .svc-L{background:#6b7280;color:#fff;}
    .svc-K{background:#EA7501;color:#fff;}
    .svc-J{background:#C9211E;color:#fff;}
    .svc-G{background:#148466;color:#fff;}
    .svc-G-local{background:#1aa87e;color:#fff;}
    .svc-I{background:#1F6A39;color:#fff;}
    .svc-IS{background:#2E8B57;color:#fff;}
    .svc-IL{background:#52A870;color:#fff;}
    .svc-H{background:#50938A;color:#fff;}
    /* ── Eira service badges ── */
    .svc-N{background:#32CD32;color:#fff;}
    .svc-M{background:#228B22;color:#fff;}
    .svc-MF{background:#6A0DAD;color:#fff;}
    .svc-MI{background:#B8860B;color:#fff;}
    .svc-MS{background:#00BFFF;color:#000;}
    /* ── Seibu Naeryuku ── */
    .svc-SN{background:#7B3F9E;color:#fff;}
    /* ── Airport Express ── */
    .svc-AX-est{background:#CC99FF;color:#1a0033;}
    .svc-AX-baj{background:#CC99FF;color:#1a0033;}
    .svc-AX-sak{background:#CC99FF;color:#1a0033;}
    .svc-AX{background:#CC99FF;color:#1a0033;}
    /* ── combo badge (two pills side by side) ── */
    .combo-badges{display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
    .combo-sep{font-size:.65rem;color:var(--text-faint);}

    /* ── STOP PATTERN DIAGRAM ── */
    #stop-diagram{margin-top:var(--space-8);border-top:1px solid var(--border);padding-top:var(--space-6);display:none;}
    .diag-title{font-size:var(--text-xs);font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);margin-bottom:var(--space-6);}
    .diag-scroll{overflow-x:auto;padding-bottom:var(--space-4);}
    .diag-table{border-collapse:collapse;font-size:10px;white-space:nowrap;}
    .diag-table td{padding:0;border:none;}
    .diag-svc-col{width:58px;min-width:58px;padding-right:8px;text-align:right;vertical-align:middle;}
    .diag-svc-pill{display:inline-block;font-size:.65rem;font-weight:800;padding:2px 6px;border-radius:3px;letter-spacing:.04em;}
    .diag-track-row td{height:26px;vertical-align:middle;}
    .diag-name-row td{vertical-align:bottom;padding-bottom:6px;}
    .diag-sta-name{
      display:block;margin:0 auto;
      width:9px;height:72px;
      writing-mode:vertical-rl;text-orientation:mixed;
      transform:rotate(180deg);
      font-size:9px;color:var(--text-muted);
      line-height:1;white-space:nowrap;
      overflow:hidden;text-overflow:ellipsis;
    }
    .diag-sta-name.is-od{color:var(--text);font-weight:700;}
    .seg-l,.seg-r{position:absolute;top:50%;height:3px;width:50%;transform:translateY(-50%);}
    .seg-l{left:0;}.seg-r{right:0;}
    .dot-s{width:10px;height:10px;border-radius:50%;border:2px solid var(--bg);position:relative;z-index:2;display:inline-block;vertical-align:middle;}
    .dot-s.od{width:13px;height:13px;}
    .dot-p{width:3px;height:10px;border-radius:2px;opacity:.5;position:relative;z-index:2;display:inline-block;vertical-align:middle;}
    .seg-bypass-l,.seg-bypass-r{position:absolute;top:50%;height:2px;width:50%;transform:translateY(-50%);background:var(--border);opacity:.9;}
    .seg-bypass-l{left:0;}.seg-bypass-r{right:0;}
    .diag-legend{display:flex;gap:var(--space-6);margin-top:var(--space-4);font-size:var(--text-xs);color:var(--text-muted);flex-wrap:wrap;}
    .diag-legend-item{display:flex;align-items:center;gap:6px;}
    .formula-box{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:var(--space-4);margin-top:var(--space-8);font-size:var(--text-xs);color:var(--text-muted);line-height:1.9;}
    .formula-box strong{color:var(--text);}
    .formula-box code{font-family:monospace;background:var(--bg);padding:1px 5px;border-radius:3px;}
    footer{border-top:1px solid var(--border);padding:var(--space-8);text-align:center;font-size:var(--text-sm);color:var(--text-muted);margin-top:var(--space-12);}
    footer a{color:var(--accent);text-decoration:none;}

    /* ── TAB SWITCHER ── */
    .tab-bar{display:flex;gap:2px;background:var(--surface-2);border-radius:var(--radius-lg);padding:3px;margin-bottom:var(--space-8);width:fit-content;}
    .tab-btn{background:none;border:none;padding:var(--space-2) var(--space-6);border-radius:calc(var(--radius-lg) - 2px);font-size:var(--text-sm);font-weight:600;color:var(--text-muted);cursor:pointer;transition:background var(--transition),color var(--transition);font-family:var(--font-body);}
    .tab-btn.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px oklch(0 0 0 / 0.15);}
    .tab-panel{display:none;}
    .tab-panel.active{display:block;}

    /* ── JOURNEY PLANNER ── */
    #jp-results{display:none;margin-top:var(--space-8);border-top:1px solid var(--border);padding-top:var(--space-6);}
    .jp-route-title{font-family:var(--font-display);font-size:var(--text-lg);font-weight:800;margin-bottom:var(--space-4);}
    .journey-list{display:flex;flex-direction:column;gap:var(--space-4);}
    .journey-card{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:var(--space-4) var(--space-6);}
    .journey-card.best{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent);}
    .journey-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:var(--space-3);flex-wrap:wrap;gap:var(--space-2);}
    .journey-times{font-family:var(--font-display);font-size:var(--text-base);font-weight:800;letter-spacing:-.01em;}
    .journey-dur{font-size:var(--text-xs);color:var(--text-muted);}
    .journey-dur .transfer-badge{display:inline-block;background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:1px 8px;font-size:.68rem;margin-left:6px;color:var(--text-muted);}
    .journey-km{font-size:.68rem;color:var(--text-faint);font-variant-numeric:tabular-nums;}
    .journey-legs{display:flex;flex-direction:column;gap:2px;}
    .leg-row{display:flex;align-items:center;gap:var(--space-3);font-size:var(--text-xs);padding:5px 0;flex-wrap:wrap;}
    .leg-svc{display:flex;align-items:center;gap:5px;min-width:120px;}
    .leg-times{font-variant-numeric:tabular-nums;color:var(--text-muted);min-width:110px;}
    .leg-stations{flex:1;color:var(--text);}
    .leg-meta{display:flex;align-items:center;gap:var(--space-3);}
    .leg-train{color:var(--text-faint);font-size:.65rem;font-family:monospace;}
    .leg-km{color:var(--text-faint);font-size:.65rem;font-variant-numeric:tabular-nums;}
    .leg-expand-btn{background:none;border:none;color:var(--accent);font-size:.65rem;cursor:pointer;padding:0 2px;font-family:var(--font-body);text-decoration:underline dotted;white-space:nowrap;}
    .leg-expand-btn:hover{color:var(--text-muted);}
    /* ── INTERMEDIATE STOPS PANEL ── */
    .leg-intermediates{
      display:none;
      flex-direction:column;
      gap:3px;
      padding:6px 0 6px calc(120px + var(--space-3) + var(--space-3));
      border-left:2px solid var(--border);
      margin:2px 0 2px 4px;
      background:var(--bg);
      border-radius:0 var(--radius-sm) var(--radius-sm) 0;
    }
    .leg-intermediates.open{display:flex;}
    .leg-int-row{
      font-size:.72rem;
      color:var(--text-muted);
      font-variant-numeric:tabular-nums;
      display:flex;
      gap:var(--space-3);
      padding:1px 8px 1px 0;
    }
    .leg-int-time{min-width:80px;color:var(--text-faint);}
    /* ── END INTERMEDIATE STOPS PANEL ── */
    .transfer-row{display:flex;align-items:center;gap:var(--space-2);font-size:.7rem;color:var(--text-faint);padding:2px 0 2px var(--space-4);}
    .transfer-row::before{content:'';display:inline-block;width:2px;height:16px;background:var(--border);border-radius:1px;margin-right:4px;}
    .jp-no-result{color:var(--text-faint);font-size:var(--text-xs);font-style:italic;padding:var(--space-4) 0;text-align:center;}
    .jp-note{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);border-radius:var(--radius-md);padding:var(--space-2) var(--space-4);font-size:var(--text-xs);color:#93c5fd;margin-bottom:var(--space-4);display:none;}

    /* ── EARLIER / LATER NAVIGATION ── */
    .jp-nav-bar{
      display:flex;
      gap:var(--space-3);
      margin-bottom:var(--space-4);
      align-items:center;
    }
    .jp-nav-btn{
      background:var(--surface-2);
      border:1px solid var(--border);
      color:var(--text-muted);
      border-radius:var(--radius-md);
      padding:var(--space-2) var(--space-4);
      font-size:var(--text-xs);
      font-weight:600;
      font-family:var(--font-body);
      cursor:pointer;
      transition:background var(--transition),color var(--transition),border-color var(--transition);
      display:flex;
      align-items:center;
      gap:5px;
    }
    .jp-nav-btn:hover{
      background:var(--border);
      color:var(--text);
      border-color:var(--text-muted);
    }
    .jp-nav-btn:disabled{
      opacity:.35;
      cursor:default;
    }
    .jp-time-chip{
      flex:1;
      text-align:center;
      font-size:var(--text-xs);
      color:var(--text-faint);
      font-variant-numeric:tabular-nums;
    }
    .jp-time-sep{
      display:flex;
      align-items:center;
      gap:var(--space-3);
      color:var(--text-faint);
      font-size:.68rem;
      margin:var(--space-2) 0;
    }
    .jp-time-sep::before,.jp-time-sep::after{
      content:'';
      flex:1;
      height:1px;
      background:var(--border);
    }

    /* ── DIRECT-ONLY TOGGLE ── */
.toggle-track{
  position:relative;
  width:40px;
  height:22px;
  flex-shrink:0;
}
.toggle-track input{
  opacity:0;
  width:0;
  height:0;
  position:absolute;
}
.toggle-slider{
  position:absolute;
  inset:0;
  background:var(--border);
  border-radius:999px;
  cursor:pointer;
  transition:background var(--transition);
}
.toggle-slider::before{
  content:'';
  position:absolute;
  left:3px;
  top:3px;
  width:16px;
  height:16px;
  border-radius:50%;
  background:#fff;
  transition:transform var(--transition);
}
.toggle-track input:checked + .toggle-slider{
  background:var(--accent);
}
.toggle-track input:checked + .toggle-slider::before{
  transform:translateX(18px);
}
.toggle-label{
  font-size:var(--text-xs);
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.07em;
  color:var(--text-muted);
  cursor:pointer;
  user-select:none;
  line-height:1.3;
}
.toggle-label span{
  display:block;
  font-size:.62rem;
  font-weight:400;
  text-transform:none;
  letter-spacing:0;
  color:var(--text-faint);
  margin-top:1px;
}

    @media(max-width:640px){
      .sim-row{grid-template-columns:1fr;}
      .sim-swap{width:100%;justify-content:center;}
      .sim-options{grid-template-columns:1fr;}
      nav,.page-header,.sim-card{padding-left:var(--space-4);padding-right:var(--space-4);}
      .jp-nav-bar{flex-wrap:wrap;}
